<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>EuEscrevo Beta 0.2</title>
<style>
:root{--ink:#292824;--paper:#fffefa;--cream:#f4efe4;--line:#d5cec0;--muted:#817b70;--gold:#a9833f}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;color:var(--ink);background:#d8d5ce}
button,select,input{font:inherit}.app{height:100dvh;display:grid;grid-template-columns:220px 1fr 300px;grid-template-rows:58px 52px 1fr;grid-template-areas:"top top top" "side tools coach" "side desk coach"}
.top{grid-area:top;background:#f8f6f1;border-bottom:1px solid #c9c5bb;display:flex;align-items:center;padding:0 18px;gap:24px;z-index:20}
.logo{font:700 22px Georgia,serif;white-space:nowrap}.logo span{font-weight:400}.feather{font-size:25px;margin-right:5px}
.menuBtn{display:none;border:0;background:transparent;font-size:24px;padding:8px}
.docname{flex:1;text-align:center}.docname input{border:0;background:transparent;text-align:center;font-weight:700;outline:0;max-width:100%}.docname small{display:block;color:#8a867c;font-size:10px}
.actions{display:flex;gap:8px}.actions button,.new{border:1px solid #bbb5aa;background:#fff;padding:9px 13px;border-radius:5px}.actions .dark{background:#292824;color:#fff;border-color:#292824}
.tools{grid-area:tools;background:#eeeae2;border-bottom:1px solid #c9c5bb;display:flex;align-items:center;padding:5px 14px;gap:4px;overflow-x:auto;scrollbar-width:none}.tools::-webkit-scrollbar{display:none}
.tool{min-width:44px;height:40px;border:0;background:transparent;border-radius:4px}.tool:hover{background:#ded9cf}.tool span{display:block;font-size:9px;color:#6e6a62}.sep{height:28px;border-left:1px solid #c7c1b6;margin:0 5px}.tools select{height:30px;border:1px solid #c7c1b6;background:#faf9f6;border-radius:3px}
.sidebar{grid-area:side;background:#272622;color:#e9e5dc;padding:16px 12px;overflow:auto;z-index:30}.new{width:100%;background:#e9e4d9;color:#24231f;text-align:left;margin-bottom:18px}
.sidebar h4{font-size:10px;letter-spacing:1.5px;color:#8e8a82;margin:18px 8px 7px}.side{width:100%;border:0;background:transparent;color:#c8c4ba;text-align:left;padding:9px;border-radius:4px}.side:hover,.side.active{background:#3a3934;color:#fff}
.chapter{padding:8px 9px;color:#bbb7ae;font-size:13px;cursor:pointer}.chapter small{display:block;color:#77736b;margin:3px 0 0 18px}.assistBox{margin-top:24px;border-top:1px solid #44423c;padding:16px 8px}.assistBox label{font-size:10px;letter-spacing:1px}.assistBox label b{float:right}.assistBox input{width:100%;accent-color:#d5b15c}.assistBox div{display:flex;justify-content:space-between;font-size:9px;color:#8e8a82}.assistBox small{display:block;text-align:center;margin-top:8px;color:#d9d4c8}
.desk{grid-area:desk;overflow:auto;padding:34px;display:flex;justify-content:center;background:#d6d3cc}.pageWrap{width:min(794px,100%);position:relative}.ruler{height:18px;background:repeating-linear-gradient(90deg,#c1bdb4 0 1px,transparent 1px 25px);border-bottom:1px solid #aaa69d}
.page{min-height:1123px;background:#fff;padding:85px 90px;box-shadow:0 2px 12px #0002;outline:0;font:19px/1.75 Georgia,serif}.page h1{text-align:center;font-size:24px;font-weight:400;margin:0 0 38px}.page p{margin:0 0 1em}.pageFooter{background:#f5f2eb;border-top:1px solid #ccc7bd;padding:8px 12px;display:flex;justify-content:space-between;color:#77736b;font-size:11px}
.coach{grid-area:coach;background:#f8f6f1;border-left:1px solid #c9c5bb;padding:0 18px}.coachHead{height:52px;border-bottom:1px solid #d8d3c8;display:flex;align-items:center;justify-content:space-between}.coachHead button{border:0;background:transparent;font-size:22px}.coachBody{padding-top:25px}.eyebrow{font-size:10px;letter-spacing:1.3px;color:#9b7a30}.coach h3{font:22px Georgia,serif}.coach p{font-size:13px;line-height:1.55;color:#625f58}.coachAction{width:100%;padding:11px;margin-top:8px;text-align:left;background:#fff;border:1px solid #d5d0c5;border-radius:5px}.coach.hidden{display:none}
.scrim{display:none}
@media(max-width:700px){
 html,body{background:var(--cream);overflow:hidden}.app{height:100dvh;display:grid;grid-template-columns:1fr;grid-template-rows:58px 48px 1fr;grid-template-areas:"top" "tools" "desk"}
 .top{padding:0 10px;gap:6px;background:#f8f3e8}.menuBtn{display:block}.logo{font-size:19px}.feather{font-size:22px}.docname{display:none}.actions{margin-left:auto;gap:5px}.actions button{padding:8px 9px;font-size:12px}.actions .dark{max-width:88px;line-height:1.05}
 .tools{padding:4px 8px;background:#efe8da}.tool{min-width:38px;height:38px}.tool span{display:none}.sep{margin:0 2px}.tools select{min-width:72px;max-width:92px;font-size:13px}
 .desk{padding:0 8px 18px;background:var(--cream);display:block}.pageWrap{width:100%;max-width:none}.ruler{display:none}.page{min-height:calc(100dvh - 140px);width:100%;padding:42px 26px 80px;box-shadow:0 1px 8px #0001;font-size:18px;line-height:1.7;background:var(--paper)}.page h1{font-size:23px;margin-bottom:32px}.pageFooter{position:sticky;bottom:0;background:#f8f3e8dd;backdrop-filter:blur(5px)}
 .sidebar{position:fixed;left:0;top:0;bottom:0;width:min(82vw,320px);transform:translateX(-105%);transition:transform .22s ease;box-shadow:8px 0 24px #0004;padding-top:18px}.sidebar.open{transform:translateX(0)}
 .scrim{display:block;position:fixed;inset:0;background:#0006;opacity:0;pointer-events:none;transition:opacity .22s;z-index:25}.scrim.open{opacity:1;pointer-events:auto}
 .coach{display:none;position:fixed;inset:auto 0 0 0;max-height:72dvh;overflow:auto;z-index:40;border:1px solid var(--line);border-radius:18px 18px 0 0;padding:0 20px;box-shadow:0 -8px 30px #0003}.coach:not(.hidden){display:block}
}
</style>
</head>
<body>
<div class="app">
<header class="top">
<button class="menuBtn" id="menuBtn" aria-label="Abrir menu">☰</button>
<div class="logo"><span class="feather">🪶</span>Eu<span>Escrevo</span></div>
<div class="docname"><input id="projectTitle" value="Paciente Zero"><small id="saveState">Salvo localmente</small></div>
<div class="actions"><button id="save">Salvar</button><button id="canon" class="dark">Finalizar capítulo</button></div>
</header>
<nav class="tools">
<button class="tool"><b>B</b><span>Negrito</span></button><button class="tool"><i>I</i><span>Itálico</span></button><button class="tool"><u>U</u><span>Sublinhar</span></button>
<div class="sep"></div><button class="tool" data-cmd="undo">↶<span>Desfazer</span></button><button class="tool" data-cmd="redo">↷<span>Refazer</span></button><div class="sep"></div>
<select id="font"><option>Georgia</option><option>Arial</option><option>Times New Roman</option></select>
<select id="fontSize"><option value="17">11</option><option value="19" selected>12</option><option value="21">14</option><option value="24">16</option></select>
<div class="sep"></div><button class="tool" id="review">✓<span>Revisar</span></button><button class="tool" id="help">✦<span>Ajuda</span></button>
</nav>
<div class="scrim" id="scrim"></div>
<aside class="sidebar" id="sidebar">
<button class="new" id="newText">＋ Novo texto</button>
<section><h4>OBRA</h4><button class="side active">▤ Manuscrito</button><button class="side">♙ Personagens</button><button class="side">⌖ Lugares</button><button class="side">◈ Banco de ideias</button></section>
<section><h4>CAPÍTULOS</h4><div id="chapters"></div></section>
<section><h4>FERRAMENTAS</h4><button class="side" id="versions">◷ Versões</button><button class="side" id="diagnose">◇ Diagnosticar trava</button><button class="side">▣ Documento final</button></section>
<div class="assistBox"><label>ASSISTÊNCIA <b id="levelLabel">3</b></label><input id="level" type="range" min="0" max="5" value="3"><div><span>EU</span><span>IA</span></div><small id="levelText">Orientador</small></div>
</aside>
<main class="desk"><div class="pageWrap"><div class="ruler"></div><article id="editor" class="page" contenteditable="true" spellcheck="true"><h1>Capítulo 3</h1><p><br></p></article><footer class="pageFooter"><span id="words">2 palavras</span><span>Página 1</span></footer></div></main>
<aside class="coach" id="coach"><div class="coachHead"><b>EuEscrevo</b><button id="closeCoach">×</button></div><div id="coachBody"><p class="eyebrow">ASSISTÊNCIA NÍVEL 3</p><h3>Escreva. Eu acompanho.</h3><p>No nível atual, eu não tomo a cena de você. Posso diagnosticar uma trava, apontar um problema local ou ajudar na construção.</p><button class="coachAction" id="stuck">Estou travado</button><button class="coachAction">Analisar este parágrafo</button><button class="coachAction">Preciso de uma palavra</button></div></aside>
</div>
<script>
const $=id=>document.getElementById(id);
const levels=["Autor puro","Leitor crítico","Orientador leve","Orientador","Coescrita","Execução IA"];
let data=JSON.parse(localStorage.getItem("euEscrevoV2")||'{"versions":[],"canon":null}');
function saveData(){localStorage.setItem("euEscrevoV2",JSON.stringify(data))}
function text(){return $("editor").innerHTML}
function count(){let n=$("editor").innerText.trim().split(/\s+/).filter(Boolean).length;$("words").textContent=n+" palavras"}
function render(){let c=$("chapters");c.innerHTML="";["Capítulo 1","Capítulo 2","Capítulo 3"].forEach((x,i)=>{let d=document.createElement("div");d.className="chapter";d.innerHTML="▤ "+x+"<small>"+(i<2?"Canônico":"Em edição")+"</small>";c.appendChild(d)});data.versions.slice(-4).reverse().forEach(v=>{let d=document.createElement("div");d.className="chapter";d.innerHTML="◷ Arquivada<small>"+v.date+"</small>";d.onclick=()=>{$("editor").innerHTML=v.html;count();closeMenu()};c.appendChild(d)})}
$("editor").addEventListener("input",()=>{count();$("saveState").textContent="Alterações não salvas"});
$("save").onclick=()=>{data.versions.push({date:new Date().toLocaleString(),html:text()});saveData();$("saveState").textContent="Salvo localmente";render()};
$("canon").onclick=()=>{if(data.canon)data.versions.push(data.canon);data.canon={date:new Date().toLocaleString(),html:text()};saveData();$("saveState").textContent="Versão canônica salva";render()};
$("level").oninput=e=>{$("levelLabel").textContent=e.target.value;$("levelText").textContent=levels[e.target.value];const eye=$("coachBody").querySelector(".eyebrow");if(eye)eye.textContent="ASSISTÊNCIA NÍVEL "+e.target.value};
$("font").onchange=e=>$("editor").style.fontFamily=e.target.value;$("fontSize").onchange=e=>$("editor").style.fontSize=e.target.value+"px";
document.querySelectorAll(".tool").forEach((b,i)=>{if(i<3)b.onclick=()=>document.execCommand(["bold","italic","underline"][i])});
document.querySelectorAll("[data-cmd]").forEach(b=>b.onclick=()=>document.execCommand(b.dataset.cmd));
$("help").onclick=()=>$("coach").classList.remove("hidden");$("closeCoach").onclick=()=>$("coach").classList.add("hidden");
$("stuck").onclick=()=>{$("coachBody").innerHTML='<p class="eyebrow">DIAGNÓSTICO</p><h3>Onde exatamente você parou?</h3><p>Marque o trecho no manuscrito ou continue escrevendo até a frase em que travou. A versão com IA real usará o contexto da obra e seu nível de assistência para decidir se pergunta, orienta ou escreve.</p><button class="coachAction" onclick="location.reload()">Voltar</button>'};
$("newText").onclick=()=>{if(confirm("Abrir um novo texto?")){$("editor").innerHTML="<h1>Novo texto</h1><p><br></p>";count();scheduleAutosave();closeMenu()}};
$("review").onclick=()=>{$("coach").classList.remove("hidden");$("coachBody").innerHTML='<p class="eyebrow">REVISÃO</p><h3>Texto pronto para análise.</h3><p>Nesta prévia visual, a revisão ainda não chama um modelo de IA. A interface já reserva o fluxo correto: clicar, analisar e agir sobre o texto — sem escrever prompt.</p>'};
function openMenu(){$("sidebar").classList.add("open");$("scrim").classList.add("open")}function closeMenu(){$("sidebar").classList.remove("open");$("scrim").classList.remove("open")}
$("menuBtn").onclick=openMenu;$("scrim").onclick=closeMenu;
render();count();
/* EuEscrevo Beta 0.2 — persistência automática local preservada */
const AUTOSAVE_KEY="euEscrevo_beta_02_autosave";let autosaveTimer=null;
function restoreAutosave(){const saved=localStorage.getItem(AUTOSAVE_KEY);if(!saved)return;try{const state=JSON.parse(saved);if(state.projectTitle)$("projectTitle").value=state.projectTitle;if(state.editorHtml)$("editor").innerHTML=state.editorHtml;if(state.level!==undefined){$("level").value=state.level;$("levelLabel").textContent=state.level;$("levelText").textContent=levels[state.level];const eye=$("coachBody").querySelector(".eyebrow");if(eye)eye.textContent="ASSISTÊNCIA NÍVEL "+state.level}count();$("saveState").textContent="Texto recuperado"}catch(e){}}
function autosaveNow(){const state={projectTitle:$("projectTitle").value,editorHtml:$("editor").innerHTML,level:$("level").value,savedAt:new Date().toISOString()};localStorage.setItem(AUTOSAVE_KEY,JSON.stringify(state));$("saveState").textContent="Salvo automaticamente"}
function scheduleAutosave(){$("saveState").textContent="Salvando...";clearTimeout(autosaveTimer);autosaveTimer=setTimeout(autosaveNow,450)}
$("editor").addEventListener("input",scheduleAutosave);$("projectTitle").addEventListener("input",scheduleAutosave);$("level").addEventListener("input",scheduleAutosave);window.addEventListener("pagehide",autosaveNow);
restoreAutosave();
</script>
</body></html>
