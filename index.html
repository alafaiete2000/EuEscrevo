<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EuEscrevo Beta 1</title>
<style>
:root{--bg:#f5f1e8;--paper:#fffdf8;--ink:#28241f;--muted:#746d63;--line:#ddd5c8;--accent:#7b4f32;--accent2:#efe4d5;--danger:#a33a32;--shadow:0 12px 34px rgba(55,42,28,.10)}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{font:15px/1.5 Georgia,"Times New Roman",serif;background:var(--bg);color:var(--ink)}
button,input{font:inherit}button{cursor:pointer}.app{height:100%;display:grid;grid-template-rows:64px 1fr}
.top{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:18px;padding:0 22px;background:var(--paper);border-bottom:1px solid var(--line)}
.brand{font-size:23px;font-weight:700}.context{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.save{font-family:system-ui,sans-serif;font-size:13px;color:var(--muted)}
.mobile-menu{display:none;border:0;background:transparent;font-size:22px}
.main{min-height:0;display:grid;grid-template-columns:280px 1fr}.side{overflow:auto;padding:20px;background:#eee7dc;border-right:1px solid var(--line)}
.section{margin-bottom:28px}.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}.section h2{font:700 12px/1 system-ui,sans-serif;letter-spacing:.12em;text-transform:uppercase;margin:0;color:var(--muted)}
.icon-btn,.small-btn,.primary,.danger,.ghost{border:1px solid var(--line);border-radius:8px;background:var(--paper);padding:7px 10px;color:var(--ink)}
.icon-btn{width:34px;height:34px;padding:0}.item{display:flex;gap:6px;margin:5px 0}.item-main{flex:1;text-align:left;border:0;border-radius:8px;padding:9px 10px;background:transparent;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.item-main.active{background:var(--paper);box-shadow:0 2px 10px rgba(55,42,28,.06)}.item-actions{display:flex;align-items:center}.mini{border:0;background:transparent;color:var(--muted);padding:5px}
.docs{border-top:1px solid var(--line);padding-top:16px}.docs button{display:block;width:100%;text-align:left;border:0;background:transparent;padding:7px 3px;color:var(--muted)}
.workspace{min-width:0;overflow:auto;padding:34px}.empty{max-width:520px;margin:12vh auto;text-align:center}.empty h1{font-size:38px;margin-bottom:10px}.empty p{color:var(--muted)}.primary{background:var(--accent);border-color:var(--accent);color:white}
.editor-shell{max-width:900px;margin:0 auto}.editor-title{margin-bottom:18px}.editor-title .work-title{font:600 13px system-ui,sans-serif;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.editor-title h1{margin:5px 0 0;font-size:31px}
.toolbar{position:sticky;top:-34px;z-index:2;display:flex;gap:6px;padding:10px;background:var(--paper);border:1px solid var(--line);border-radius:10px 10px 0 0}.tool{min-width:36px;border:0;border-radius:6px;background:transparent;padding:7px}.tool:hover{background:var(--accent2)}
.editor{min-height:65vh;padding:42px 52px;background:var(--paper);border:1px solid var(--line);border-top:0;border-radius:0 0 10px 10px;box-shadow:var(--shadow);font-size:19px;line-height:1.75;outline:none;white-space:pre-wrap}.editor:empty:before{content:"Comece a escrever…";color:#aaa;pointer-events:none}
.modal-backdrop{position:fixed;inset:0;background:rgba(35,29,24,.45);display:grid;place-items:center;padding:20px;z-index:20}.modal{width:min(560px,100%);max-height:85vh;overflow:auto;background:var(--paper);border-radius:14px;padding:24px;box-shadow:var(--shadow)}.modal h2{margin-top:0}.modal p,.modal li{color:var(--muted)}.modal input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:white;margin:6px 0 12px}.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}.danger{background:var(--danger);border-color:var(--danger);color:white}.hidden{display:none!important}.corrupt{max-width:650px;margin:10vh auto;background:var(--paper);padding:30px;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
@media(max-width:760px){.app{grid-template-rows:56px 1fr}.top{padding:0 12px;gap:10px}.mobile-menu{display:block}.brand{font-size:19px}.context{display:none}.main{display:block}.side{position:fixed;z-index:10;top:56px;bottom:0;left:0;width:min(310px,88vw);transform:translateX(-105%);transition:.2s;box-shadow:var(--shadow)}.side.open{transform:none}.workspace{padding:18px 12px}.editor-title h1{font-size:26px}.editor{padding:28px 22px;min-height:72vh;font-size:18px}.toolbar{top:-18px}}
</style>
</head>
<body>
<div class="app">
<header class="top">
<button class="mobile-menu" id="menuBtn" aria-label="Abrir menu">☰</button>
<div class="brand">EuEscrevo</div>
<div class="context" id="context"></div>
<div class="save" id="saveState">Salvo</div>
</header>
<div class="main">
<aside class="side" id="side">
<section class="section"><div class="section-head"><h2>Obras</h2><button class="icon-btn" id="newWork" title="Nova obra">＋</button></div><div id="works"></div></section>
<section class="section" id="chaptersSection"><div class="section-head"><h2>Capítulos</h2><button class="icon-btn" id="newChapter" title="Novo capítulo">＋</button></div><div id="chapters"></div></section>
<nav class="docs"><button data-doc="about">Sobre</button><button data-doc="features">Funcionalidades</button><button data-doc="faq">FAQ</button><button data-doc="history">Histórico de Atualizações</button></nav>
</aside>
<main class="workspace" id="workspace"></main>
</div>
</div>
<div id="modalRoot"></div>
<script>
(()=>{
'use strict';
const STORAGE_KEY='euescrevo_beta1_state';
const PersistenceService={
 load(){const raw=localStorage.getItem(STORAGE_KEY);if(raw===null)return null;return JSON.parse(raw)},
 persist(state){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
};
let state={works:[],activeWorkId:null}, saveTimer=null, persistenceBlocked=false, editor=null, currentDoc=null;
const $=s=>document.querySelector(s);
const uid=()=>crypto.randomUUID?crypto.randomUUID():'id-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2);
const now=()=>new Date().toISOString();
function validState(s){
 if(!s||typeof s!=='object'||!Array.isArray(s.works)||!(s.activeWorkId===null||typeof s.activeWorkId==='string'))return false;
 const ids=new Set();
 for(const w of s.works){
  if(!w||typeof w.id!=='string'||ids.has(w.id)||typeof w.title!=='string'||typeof w.author!=='string'||typeof w.createdAt!=='string'||typeof w.updatedAt!=='string'||!Array.isArray(w.chapters)||w.chapters.length<1||typeof w.activeChapterId!=='string')return false;
  ids.add(w.id);const cids=new Set();
  for(const c of w.chapters){if(!c||typeof c.id!=='string'||cids.has(c.id)||typeof c.title!=='string'||typeof c.content!=='string'||typeof c.createdAt!=='string'||typeof c.updatedAt!=='string')return false;cids.add(c.id)}
  if(!cids.has(w.activeChapterId))return false;
 }
 if(s.works.length===0&&s.activeWorkId!==null)return false;
 if(s.works.length>0&&!ids.has(s.activeWorkId))return false;
 return true;
}
function activeWork(){return state.works.find(w=>w.id===state.activeWorkId)||null}
function activeChapter(){const w=activeWork();return w?w.chapters.find(c=>c.id===w.activeChapterId)||null:null}
function setSave(label){$('#saveState').textContent=label}
function persistImmediate(){
 if(persistenceBlocked)return false;
 if(saveTimer){clearTimeout(saveTimer);saveTimer=null}
 setSave('Salvando…');
 try{PersistenceService.persist(state);setSave('Salvo');return true}catch(e){setSave('Erro ao salvar');return false}
}
function dirty(){
 if(persistenceBlocked)return;
 setSave('Alterações não salvas');clearTimeout(saveTimer);
 saveTimer=setTimeout(()=>{saveTimer=null;persistImmediate()},500);
}
function syncEditor(){
 if(!editor)return;const w=activeWork(),c=activeChapter();if(!w||!c)return;
 if(c.content!==editor.innerHTML){c.content=editor.innerHTML;c.updatedAt=now();w.updatedAt=c.updatedAt;dirty()}
}
function closeMobile(){if(innerWidth<=760)$('#side').classList.remove('open')}
function render(){
 const w=activeWork(),c=activeChapter();
 $('#context').textContent=w&&c?`${w.title} / ${c.title}`:'';
 $('#works').innerHTML=state.works.map(x=>`<div class="item"><button class="item-main ${x.id===state.activeWorkId?'active':''}" data-work="${x.id}">${esc(x.title)}</button><span class="item-actions"><button class="mini" data-edit-work="${x.id}" title="Editar obra">✎</button><button class="mini" data-delete-work="${x.id}" title="Excluir obra">×</button></span></div>`).join('');
 $('#chaptersSection').classList.toggle('hidden',!w);
 $('#chapters').innerHTML=w?w.chapters.map(x=>`<div class="item"><button class="item-main ${x.id===w.activeChapterId?'active':''}" data-chapter="${x.id}">${esc(x.title)}</button><span class="item-actions"><button class="mini" data-edit-chapter="${x.id}" title="Renomear capítulo">✎</button><button class="mini" data-delete-chapter="${x.id}" title="Excluir capítulo">×</button></span></div>`).join(''):'';
 if(currentDoc){showDoc(currentDoc,false);return}
 if(!w){$('#workspace').innerHTML=`<div class="empty"><h1>Sua escrita começa aqui.</h1><p>Crie uma obra para organizar seus capítulos e começar a escrever.</p><button class="primary" id="emptyCreate">Criar obra</button></div>`;editor=null;$('#emptyCreate').onclick=createWork;return}
 $('#workspace').innerHTML=`<div class="editor-shell"><div class="editor-title"><div class="work-title">${esc(w.title)}</div><h1>${esc(c.title)}</h1></div><div class="toolbar"><button class="tool" data-cmd="bold" title="Negrito"><b>N</b></button><button class="tool" data-cmd="italic" title="Itálico"><i>I</i></button><button class="tool" data-cmd="underline" title="Sublinhado"><u>S</u></button><button class="tool" data-cmd="undo" title="Desfazer">↶</button><button class="tool" data-cmd="redo" title="Refazer">↷</button></div><div class="editor" id="editor" contenteditable="true" spellcheck="true"></div></div>`;
 editor=$('#editor');editor.innerHTML=c.content;editor.addEventListener('input',syncEditor);
 document.querySelectorAll('[data-cmd]').forEach(b=>b.onclick=()=>{editor.focus();document.execCommand(b.dataset.cmd,false,null)});
}
function esc(v){const d=document.createElement('div');d.textContent=v;return d.innerHTML}
function modal(title,body,actions){
 $('#modalRoot').innerHTML=`<div class="modal-backdrop"><div class="modal"><h2>${esc(title)}</h2>${body}<div class="modal-actions">${actions}</div></div></div>`;
 $('.modal-backdrop').onclick=e=>{if(e.target===e.currentTarget)closeModal()}
}
function closeModal(){$('#modalRoot').innerHTML=''}
function createWork(){
 modal('Nova obra','<label>Título</label><input id="workTitle" maxlength="120" value="Minha obra"><label>Autor</label><input id="workAuthor" maxlength="120" value="">','<button class="ghost" id="cancel">Cancelar</button><button class="primary" id="confirm">Criar obra</button>');
 $('#cancel').onclick=closeModal;$('#confirm').onclick=()=>{const title=$('#workTitle').value.trim(),author=$('#workAuthor').value.trim();if(!title)return;const t=now(),cid=uid(),w={id:uid(),title,author,createdAt:t,updatedAt:t,activeChapterId:cid,chapters:[{id:cid,title:'Capítulo 1',content:'',createdAt:t,updatedAt:t}]};state.works.push(w);state.activeWorkId=w.id;currentDoc=null;closeModal();persistImmediate();render()};
}
function editWork(id){
 const w=state.works.find(x=>x.id===id);if(!w)return;
 modal('Editar obra',`<label>Título</label><input id="workTitle" maxlength="120" value="${esc(w.title)}"><label>Autor</label><input id="workAuthor" maxlength="120" value="${esc(w.author)}">`,'<button class="ghost" id="cancel">Cancelar</button><button class="primary" id="confirm">Salvar</button>');
 $('#cancel').onclick=closeModal;$('#confirm').onclick=()=>{const t=$('#workTitle').value.trim();if(!t)return;w.title=t;w.author=$('#workAuthor').value.trim();w.updatedAt=now();closeModal();persistImmediate();render()};
}
function deleteWork(id){
 const w=state.works.find(x=>x.id===id);if(!w)return;
 modal('Excluir obra',`<p><strong>${esc(w.title)}</strong></p><p>Excluir esta obra apagará seus capítulos e textos salvos neste dispositivo. Esta ação não pode ser desfeita na Beta 1.</p>`,'<button class="ghost" id="cancel">Cancelar</button><button class="danger" id="confirm">Excluir obra</button>');
 $('#cancel').onclick=closeModal;$('#confirm').onclick=()=>{state.works=state.works.filter(x=>x.id!==id);if(state.activeWorkId===id)state.activeWorkId=state.works[0]?.id||null;currentDoc=null;closeModal();persistImmediate();render()};
}
function createChapter(){
 const w=activeWork();if(!w)return;syncEditor();persistImmediate();const t=now(),n=w.chapters.length+1,c={id:uid(),title:`Capítulo ${n}`,content:'',createdAt:t,updatedAt:t};w.chapters.push(c);w.activeChapterId=c.id;w.updatedAt=t;currentDoc=null;persistImmediate();render();closeMobile();
}
function renameChapter(id){
 const w=activeWork(),c=w?.chapters.find(x=>x.id===id);if(!c)return;
 modal('Renomear capítulo',`<label>Título</label><input id="chapterTitle" maxlength="120" value="${esc(c.title)}">`,'<button class="ghost" id="cancel">Cancelar</button><button class="primary" id="confirm">Salvar</button>');
 $('#cancel').onclick=closeModal;$('#confirm').onclick=()=>{const t=$('#chapterTitle').value.trim();if(!t)return;c.title=t;c.updatedAt=now();w.updatedAt=c.updatedAt;closeModal();persistImmediate();render()};
}
function deleteChapter(id){
 const w=activeWork(),c=w?.chapters.find(x=>x.id===id);if(!c)return;if(w.chapters.length===1){modal('Capítulo obrigatório','<p>O único capítulo da obra não pode ser excluído.</p>','<button class="primary" id="confirm">Entendi</button>');$('#confirm').onclick=closeModal;return}
 modal('Excluir capítulo',`<p>Excluir <strong>${esc(c.title)}</strong> removerá o capítulo e seu conteúdo. Capítulos excluídos não podem ser recuperados na Beta 1.</p>`,'<button class="ghost" id="cancel">Cancelar</button><button class="danger" id="confirm">Excluir capítulo</button>');
 $('#cancel').onclick=closeModal;$('#confirm').onclick=()=>{w.chapters=w.chapters.filter(x=>x.id!==id);if(w.activeChapterId===id)w.activeChapterId=w.chapters[0].id;w.updatedAt=now();closeModal();persistImmediate();render()};
}
const docs={
 about:['Sobre',`<p>EuEscrevo é uma ferramenta criada para o ato de escrever.</p><p>Em vez de exigir que o escritor converse com uma inteligência artificial ou aprenda a criar prompts, o EuEscrevo organiza o ambiente de escrita em obras, capítulos e estados de trabalho.</p><p>A proposta é simples: você escreve. A ferramenta acompanha o processo sem transformar a escrita em uma conversa com um chatbot.</p><p>Criado por André Lafaiete.</p>`],
 features:['Funcionalidades',`<ul><li>Criação e gestão de múltiplas obras.</li><li>Criação e gestão de capítulos independentes.</li><li>Editor de manuscrito com negrito, itálico e sublinhado.</li><li>Desfazer e refazer no editor.</li><li>Salvamento automático local.</li><li>Restauração da última obra, capítulo e rascunho persistidos.</li><li>Interface adaptada para desktop e mobile.</li></ul>`],
 faq:['FAQ',`<h3>Onde meus textos ficam salvos?</h3><p>No armazenamento local do navegador deste dispositivo.</p><h3>Os textos sincronizam entre aparelhos?</h3><p>Não. A Beta 1 não possui sincronização entre aparelhos.</p><h3>Existe autosave?</h3><p>Sim. Durante a digitação, o salvamento automático ocorre após 500 ms sem nova alteração. Trocas de obra ou capítulo solicitam persistência imediata.</p><h3>O que significa o indicador de salvamento?</h3><p>Ele informa o estado real: Alterações não salvas, Salvando…, Salvo ou Erro ao salvar.</p><h3>Posso criar múltiplas obras?</h3><p>Sim. Cada obra possui seus próprios capítulos.</p><h3>Os capítulos são independentes?</h3><p>Sim. Cada capítulo mantém seu próprio rascunho.</p><h3>Posso recuperar uma obra excluída?</h3><p>Não. Na Beta 1, a exclusão de uma obra é irreversível.</p><h3>Posso recuperar um capítulo excluído?</h3><p>Não. Na Beta 1, capítulos excluídos não podem ser recuperados.</p><h3>A IA já funciona nesta versão?</h3><p>Não. A Beta 1 não implementa assistência funcional por IA.</p>`],
 history:['Histórico de Atualizações',`<h3>EuEscrevo Beta 1</h3><p>14 de julho de 2026</p><blockquote>Primeira versão oficial do projeto EuEscrevo.</blockquote><p>A Beta 1 estabelece a arquitetura fundamental do aplicativo: obras independentes, capítulos com rascunhos próprios e persistência local do estado de escrita.</p><p>Este marco representa a reconstrução do EuEscrevo sobre uma base planejada para evolução futura.</p><p>Criador: André Lafaiete.</p>`]
};
function showDoc(key,rerender=true){syncEditor();if(rerender)persistImmediate();currentDoc=key;const d=docs[key];$('#workspace').innerHTML=`<div class="editor-shell"><div class="editor-title"><div class="work-title">Documentação</div><h1>${d[0]}</h1></div><div class="editor" style="min-height:auto" contenteditable="false">${d[1]}</div></div>`;editor=null;closeMobile()}
function corruptScreen(){
 $('#side').classList.add('hidden');$('#workspace').innerHTML=`<div class="corrupt"><h1>Não foi possível abrir os dados salvos do EuEscrevo.</h1><p>Nenhum novo dado será gravado até você decidir como continuar.</p><button class="danger" id="resetData">Apagar dados locais e recomeçar</button></div>`;setSave('Erro ao salvar');
 $('#resetData').onclick=()=>{modal('Apagar dados locais?',`<p>Os dados atualmente salvos nesta chave serão apagados. Esta ação não pode ser desfeita pela Beta 1.</p>`,'<button class="ghost" id="cancel">Cancelar</button><button class="danger" id="confirm">Apagar e recomeçar</button>');$('#cancel').onclick=closeModal;$('#confirm').onclick=()=>{localStorage.removeItem(STORAGE_KEY);state={works:[],activeWorkId:null};persistenceBlocked=false;closeModal();$('#side').classList.remove('hidden');setSave('Salvo');render()}};
}
$('#menuBtn').onclick=()=>$('#side').classList.toggle('open');
$('#newWork').onclick=createWork;$('#newChapter').onclick=createChapter;
$('#works').onclick=e=>{const b=e.target.closest('button');if(!b)return;if(b.dataset.work){syncEditor();persistImmediate();state.activeWorkId=b.dataset.work;currentDoc=null;persistImmediate();render();closeMobile()}else if(b.dataset.editWork)editWork(b.dataset.editWork);else if(b.dataset.deleteWork)deleteWork(b.dataset.deleteWork)};
$('#chapters').onclick=e=>{const b=e.target.closest('button');if(!b)return;if(b.dataset.chapter){syncEditor();persistImmediate();activeWork().activeChapterId=b.dataset.chapter;currentDoc=null;persistImmediate();render();closeMobile()}else if(b.dataset.editChapter)renameChapter(b.dataset.editChapter);else if(b.dataset.deleteChapter)deleteChapter(b.dataset.deleteChapter)};
document.querySelectorAll('[data-doc]').forEach(b=>b.onclick=()=>showDoc(b.dataset.doc));
window.addEventListener('beforeunload',()=>{syncEditor();if(!persistenceBlocked){try{PersistenceService.persist(state)}catch(e){}}});
try{const loaded=PersistenceService.load();if(loaded===null){state={works:[],activeWorkId:null};render()}else if(validState(loaded)){state=loaded;render()}else{persistenceBlocked=true;corruptScreen()}}catch(e){persistenceBlocked=true;corruptScreen()}
})();
</script>
</body>
</html>
